name: Sync Canary to Gitee

permissions:
  contents: write

on:
  # 自动同步：每4小时检查上游更新
  schedule:
    - cron: '0 */4 * * *'
  # 手动同步：点击 GitHub 仓库的 "Sync fork" 后自动触发
  push:
    branches:
      - canary
  # 手动触发
  workflow_dispatch:

jobs:
  sync-and-push:
    name: Sync upstream canary and push to Gitee
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: canary

      - name: Sync upstream canary to GitHub fork
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: lobehub/lobehub
          upstream_sync_branch: canary
          target_sync_branch: canary
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      - name: Show sync result
        run: |
          if [ "${{ steps.sync.outputs.has_new_commits }}" == "true" ]; then
            echo "✅ 上游有新的提交，已同步到 GitHub fork 的 canary 分支"
          else
            echo "✅ 上游 canary 无新提交，无需同步"
          fi

      - name: Push to Gitee canary
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 如果没有新提交，也仍执行推送（确保 Gitee 与 GitHub fork 一致）
          git remote add gitee https://pieth:${GITEE_TOKEN}@gitee.com/pieth/lobehub-plus.git
          git push -f gitee canary
          echo "### 🚀 同步完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 步骤 | 结果 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 上游可引用 (canary) | \`lobehub/lobehub\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 目标仓库 | \`pieth/lobehub-plus\` (Gitee) |" >> $GITHUB_STEP_SUMMARY
          echo "| 目标分支 | \`canary\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 最新提交 | \`$(git log --oneline -1)\` |" >> $GITHUB_STEP_SUMMARY
